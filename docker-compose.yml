services:
  # Multi-User-Fundament: Postgres statt der SQLite-Fallback-Datei. Für einen
  # verwalteten Postgres-Dienst in Produktion (RDS/Neon/Supabase) einfach
  # DATABASE_URL beim shiori-Service überschreiben und diesen "db"-Service
  # weglassen - er ist primär für lokale Entwicklung/Selfhosting gedacht.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shiori
      POSTGRES_PASSWORD: shiori
      POSTGRES_DB: shiori
    volumes:
      - shiori_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiori"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Multi-User Phase 3: Job-Queue (RQ) + Rate-Limiting (Flask-Limiter) teilen
  # sich dieselbe Redis-Instanz - siehe webapp.py REDIS_URL.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - shiori_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  shiori:
    build: .
    image: shiori
    container_name: shiori
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9020:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://shiori:shiori@db:5432/shiori
      REDIS_URL: redis://redis:6379/0
      # Nur DIESER (Web-)Container wendet die DB-Migrationen an - der
      # Worker-Container wartet nur, bis das Schema steht (siehe
      # docker-entrypoint.sh). Verhindert, dass beide gleichzeitig migrieren.
      RUN_MIGRATIONS: "1"
      # Erzeugen: python3 -c "from shiori.crypto import generate_master_key; print(generate_master_key())"
      # Ohne Python 3 auf dem Host (NAS): openssl rand -base64 32 | tr '+/' '-_'
      WKCARDS_SECRET_KEY: ${WKCARDS_SECRET_KEY:?WKCARDS_SECRET_KEY muss gesetzt sein - siehe README}
      WKCARDS_SESSION_SECRET: ${WKCARDS_SESSION_SECRET:?WKCARDS_SESSION_SECRET muss gesetzt sein - siehe README}
      # Hinter HTTPS-Terminierung (Reverse-Proxy) aktivieren, damit das
      # Session-Cookie nur über HTTPS gesendet wird (siehe webapp.py):
      # SESSION_COOKIE_SECURE: "1"
      # Anzahl vertrauenswürdiger Reverse-Proxy-Hops davor (X-Forwarded-For),
      # damit Rate-Limiting/Client-IP korrekt funktionieren - NUR setzen, wenn
      # tatsächlich ein Proxy davor steht (siehe webapp.py ProxyFix):
      # TRUST_PROXY: "1"
      # Optional: S3/MinIO statt lokalem Disk für PDFs/APKGs (siehe storage.py).
      # S3_BUCKET: shiori-outputs
      # S3_ENDPOINT_URL: http://minio:9000
      # Optional: Error-Tracking via Sentry, siehe webapp.py.
      # SENTRY_DSN: https://xxx@xxx.ingest.sentry.io/xxx
      # SENTRY_ENVIRONMENT: production
    volumes:
      # PDFs/Anki-Exporte + API-Caches liegen weiterhin dateibasiert im Host-
      # Ordner ./data, solange kein S3_BUCKET gesetzt ist (siehe storage.py).
      - ./data:/data
    restart: unless-stopped

  # Verarbeitet die von webapp.py über `render_queue.enqueue()` eingereihten
  # Render-Jobs (siehe webapp.py `_run_render`) - eigener Prozess/Container,
  # damit ein hängender Render-Job nicht den Webserver blockiert und sich die
  # Anzahl der Worker unabhängig von den Webserver-Instanzen skalieren lässt
  # (z. B. `docker compose up --scale worker=3`).
  worker:
    build: .
    image: shiori
    command: rq worker renders --url redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://shiori:shiori@db:5432/shiori
      REDIS_URL: redis://redis:6379/0
      WKCARDS_SECRET_KEY: ${WKCARDS_SECRET_KEY:?WKCARDS_SECRET_KEY muss gesetzt sein - siehe README}
      WKCARDS_SESSION_SECRET: ${WKCARDS_SESSION_SECRET:?WKCARDS_SESSION_SECRET muss gesetzt sein - siehe README}
      # Optional: Error-Tracking via Sentry, erfasst auch Fehler in Render-Jobs
      # (RqIntegration), siehe webapp.py.
      # SENTRY_DSN: https://xxx@xxx.ingest.sentry.io/xxx
      # SENTRY_ENVIRONMENT: production
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Räumt periodisch alten Job-Verlauf (samt PDF-/APKG-Datei in ./data/output)
  # weg - eigener Prozess (analog zum RQ-Worker), damit weder Webserver noch
  # Render-Worker dafür zuständig sind (siehe cleanup_worker.py).
  cleanup:
    build: .
    image: shiori
    command: python -m shiori.cleanup_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://shiori:shiori@db:5432/shiori
      REDIS_URL: redis://redis:6379/0
      WKCARDS_SECRET_KEY: ${WKCARDS_SECRET_KEY:?WKCARDS_SECRET_KEY muss gesetzt sein - siehe README}
      WKCARDS_SESSION_SECRET: ${WKCARDS_SESSION_SECRET:?WKCARDS_SESSION_SECRET muss gesetzt sein - siehe README}
      # Wie lange abgeschlossene Jobs aufbewahrt werden, bevor sie samt
      # PDF/APKG gelöscht werden (Tage). Default 30.
      # JOB_RETENTION_DAYS: "30"
      # Wie oft der Aufräum-Durchlauf läuft (Sekunden). Default 1x täglich.
      # JOB_CLEANUP_INTERVAL_SECONDS: "86400"
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  shiori_pg_data:
  shiori_redis_data:
