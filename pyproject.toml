[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle-Basics, I: Import-Sortierung, UP: pyupgrade
# (moderne Syntax), B: bugbear (häufige Fehlerquellen), C4: comprehensions.
select = ["E", "F", "I", "UP", "B", "C4"]
ignore = [
    "E501",  # Zeilenlänge - viele Docstrings/YAML-Blöcke sind bewusst lang, line-length oben ist nur eine Richtschnur
    "B008",  # Flask-Routen nutzen Default-Argument-Aufrufe (z. B. request.args.get(...)) idiomatisch
]

[tool.ruff.lint.per-file-ignores]
# Test-Dateien: sys.path-Manipulation vor Imports ist beabsichtigt (siehe
# conftest.py-Docstring), F401 bei bewusst re-exportierten Fixtures/Modulen.
"tests/*" = ["E402"]
"migrations/env.py" = ["E402", "F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["shiori"]
omit = ["*/migrations/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
exclude = ["migrations/versions/"]
